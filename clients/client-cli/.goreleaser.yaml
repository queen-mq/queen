version: 2

project_name: queenctl

# This subproject lives inside the smartpricing/queen monorepo. Release tags
# are shaped `clients/client-cli/vX.Y.Z` to satisfy Go's module proxy
# convention for nested modules. Without this block GoReleaser tries to parse
# the whole tag as semver and fails with "invalid semantic version".
monorepo:
  tag_prefix: clients/client-cli/
  dir: clients/client-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: queenctl
    main: .
    binary: queenctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/smartpricing/queen/clients/client-cli/cmd.BuildVersion={{ .Version }}
      - -X github.com/smartpricing/queen/clients/client-cli/cmd.BuildCommit={{ .ShortCommit }}
      - -X github.com/smartpricing/queen/clients/client-cli/cmd.BuildDate={{ .CommitDate }}

archives:
  - id: queenctl-archive
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE.md
      - README.md
      - completions/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  github:
    owner: smartpricing
    name: queen
  prerelease: auto
  draft: false
  name_template: 'queenctl {{ .Version }}'
  header: |
    queenctl is the Queen MQ operator CLI.

    Install:
      # Pre-built binary (recommended)
      # Download the matching tar.gz / zip from the assets below and put `queenctl` on $PATH.

      # Or with Go (1.22+):
      go install github.com/smartpricing/queen/clients/client-cli/cmd/queenctl@v{{ .Version }}

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

git:
  tag_sort: -version:refname

env_files:
  github_token: ~/.config/goreleaser/github_token
