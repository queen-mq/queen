name: Release CLI

# Triggered by tags shaped 'clients/client-cli/vX.Y.Z'. The directory-prefixed
# pattern is required so Go's module proxy can resolve the submodule at
# github.com/smartpricing/queen/clients/client-cli — see
# https://go.dev/ref/mod#vcs-version and developer/14-release.md.
on:
  push:
    tags:
      - 'clients/client-cli/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist on origin)'
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: clients/client-cli/go.sum

      - name: Pre-build completions
        working-directory: clients/client-cli
        run: |
          make build
          make completion

      # GoReleaser parses the tag as semver. Our tags are shaped
      # `clients/client-cli/vX.Y.Z` to satisfy Go's module proxy convention
      # for nested modules, so we strip the directory prefix and pass the
      # result via GORELEASER_CURRENT_TAG (and GORELEASER_PREVIOUS_TAG so
      # the changelog computation doesn't fall back to an unrelated tag).
      - name: Compute semver tag for goreleaser
        id: tag
        run: |
          full_ref="${{ github.event.inputs.tag || github.ref_name }}"
          semver="${full_ref#clients/client-cli/}"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "Resolved semver: $semver"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: clients/client-cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.semver }}
