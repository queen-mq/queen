name: Release CLI

# Triggered by tags shaped 'clients/client-cli/vX.Y.Z'. The directory-prefixed
# pattern is required so Go's module proxy can resolve the submodule at
# github.com/smartpricing/queen/clients/client-cli — see
# https://go.dev/ref/mod#vcs-version and developer/14-release.md.
on:
  push:
    tags:
      - 'clients/client-cli/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist on origin)'
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: clients/client-cli/go.sum

      - name: Pre-build completions
        working-directory: clients/client-cli
        run: |
          make build
          make completion

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: clients/client-cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
