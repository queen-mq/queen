<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/queen_head.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queen - Message Queue Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;550;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Theme initialization (prevent flash) -->
    <!-- App is dark-only. Force dark before any bundle loads so SPA routes
         that don't pull the chart chunk (e.g. /messages on hard reload) still
         render correctly. -->
    <script>
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    </script>
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
